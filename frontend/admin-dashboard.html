<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng điều khiển Quản trị - PetShop</title>
    <!-- Google Fonts/CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background-color: #f8f9fa; }
        .admin-layout { display: flex; min-height: 100vh; }
        .admin-content { flex: 1; padding: 0; overflow-y: auto; display: flex; flex-direction: column; }
        .admin-header { background-color: #fff; padding: 1rem 2rem; border-bottom: 1px solid #e9ecef; display: flex; justify-content: space-between; align-items: center; }
        .admin-main { padding: 2rem; flex: 1; }
        .stat-card { transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-5px); }
        .chart-container { position: relative; height: 300px; width: 100%; }
        .search-bar { max-width: 300px; }
    </style>
</head>
<body>

    <div class="admin-layout">
        <!-- Sidebar injected by JS -->
        <div id="adminSidebar"></div>

        <!-- Main Content -->
        <div class="admin-content">
            <!-- Top Header -->
            <header class="admin-header shadow-sm">
                <div class="d-flex align-items-center w-100 justify-content-between">
                    <div class="search-bar input-group w-50">
                        <span class="input-group-text bg-light border-0"><i class="fa-solid fa-search text-muted"></i></span>
                        <input type="text" class="form-control bg-light border-0" placeholder="Tìm kiếm đơn hàng, người dùng...">
                    </div>
                    <div class="dropdown">
                        <a href="#" class="d-flex align-items-center link-dark text-decoration-none dropdown-toggle user-profile-dropdown" id="dropdownUser" data-bs-toggle="dropdown" aria-expanded="false">
                            <!-- Injected by JS -->
                            <img src="https://ui-avatars.com/api/?name=Admin&background=random" alt="" width="35" height="35" class="rounded-circle me-2 profile-img">
                            <strong class="profile-name">Admin</strong>
                        </a>
                        <ul class="dropdown-menu text-small shadow dropdown-menu-end" aria-labelledby="dropdownUser">
                            <li><a class="dropdown-item" href="index.html"><i class="fa-solid fa-store me-2"></i> Về cửa hàng</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="fa-solid fa-sign-out-alt me-2"></i> Đăng xuất</a></li>
                        </ul>
                    </div>
                </div>
            </header>

            <div class="admin-main">
                <h2 class="fw-bold mb-4">Tổng quan</h2>
                
                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="card stat-card border-0 shadow-sm rounded-4 bg-primary text-white h-100">
                            <div class="card-body p-4 d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="fw-normal mb-1 opacity-75">Tổng doanh thu</h6>
                                    <h3 class="fw-bold mb-0" id="stat-revenue">$0.00</h3>
                                </div>
                                <div class="bg-white bg-opacity-25 p-3 rounded-circle">
                                    <i class="fa-solid fa-sack-dollar fs-3"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card border-0 shadow-sm rounded-4 bg-success text-white h-100">
                            <div class="card-body p-4 d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="fw-normal mb-1 opacity-75">Tổng số đơn hàng</h6>
                                    <h3 class="fw-bold mb-0" id="stat-orders">0</h3>
                                </div>
                                <div class="bg-white bg-opacity-25 p-3 rounded-circle">
                                    <i class="fa-solid fa-cart-arrow-down fs-3"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card border-0 shadow-sm rounded-4 text-white h-100" style="background-color: var(--secondary-color);">
                            <div class="card-body p-4 d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="fw-normal mb-1 opacity-75">Tổng số sản phẩm</h6>
                                    <h3 class="fw-bold mb-0" id="stat-products">0</h3>
                                </div>
                                <div class="bg-white bg-opacity-25 p-3 rounded-circle">
                                    <i class="fa-solid fa-tags fs-3"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card border-0 shadow-sm rounded-4 bg-warning text-dark h-100">
                            <div class="card-body p-4 d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="fw-normal mb-1 opacity-75">Tổng số người dùng</h6>
                                    <h3 class="fw-bold mb-0" id="stat-users">0</h3>
                                </div>
                                <div class="bg-white bg-opacity-50 p-3 rounded-circle">
                                    <i class="fa-solid fa-users fs-3"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4 mb-4">
                    <!-- Line Chart -->
                    <div class="col-lg-8">
                        <div class="card border-0 shadow-sm rounded-4 h-100">
                            <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                                <h5 class="fw-bold mb-0">Doanh thu hàng tháng</h5>
                            </div>
                            <div class="card-body">
                                <div class="chart-container">
                                    <canvas id="revenueChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Pie Chart -->
                    <div class="col-lg-4">
                        <div class="card border-0 shadow-sm rounded-4 h-100">
                            <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                                <h5 class="fw-bold mb-0">Sản phẩm theo danh mục</h5>
                            </div>
                            <div class="card-body">
                                <div class="chart-container">
                                    <canvas id="categoryChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-header bg-white border-bottom-0 pt-4 pb-3 d-flex justify-content-between align-items-center">
                        <h5 class="fw-bold mb-0">Đơn hàng gần đây</h5>
                        <a href="admin-orders.html" class="btn btn-sm btn-outline-primary rounded-pill px-3">Xem tất cả</a>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">Mã đơn</th>
                                        <th>Khách hàng</th>
                                        <th>Sản phẩm</th>
                                        <th>Tổng tiền</th>
                                        <th>Trạng thái</th>
                                        <th>Ngày đặt</th>
                                        <th class="pe-4">Hành động</th>
                                    </tr>
                                </thead>
                                <tbody id="recent-orders-body">
                                    <!-- Injected by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper & Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script src="js/product.js"></script>
    <script src="js/order.js"></script>
    <script src="js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderDashboard();
        });
    </script>
</body>
</html>
