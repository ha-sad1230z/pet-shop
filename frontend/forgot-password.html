<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - PetShop</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <div class="container d-flex flex-column justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="text-center mb-4">
            <a href="index.html" class="text-decoration-none">
                <h2 class="navbar-brand justify-content-center">
                    <i class="fa-solid fa-paw text-primary-custom"></i> PetShop
                </h2>
            </a>
        </div>
        
        <div class="card auth-card" style="width: 100%; max-width: 450px;">
            <div class="card-body p-4">
                <h4 class="text-center mb-2">Đặt lại mật khẩu</h4>
                <p class="text-center text-muted mb-4">Nhập địa chỉ email của bạn và chúng tôi sẽ gửi cho bạn liên kết để đặt lại mật khẩu.</p>

                <div id="resetAlert" class="alert d-none" role="alert"></div>

                <form id="forgotPasswordForm">
                    <div class="mb-4">
                        <label for="resetEmail" class="form-label fw-semibold">Địa chỉ Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
                            <input type="email" class="form-control" id="resetEmail" required placeholder="Nhập email của bạn">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Gửi liên kết đặt lại mật khẩu</button>
                    <div class="text-center">
                        <a href="login.html" class="text-decoration-none text-muted"><i class="fa-solid fa-arrow-left me-1"></i> Quay lại đăng nhập</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            const alertBox = document.getElementById('resetAlert');
            const submitBtn = this.querySelector('button[type="submit"]');
            
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Đang xử lý...';
            submitBtn.disabled = true;

            try {
                const response = await fetchAPI('/auth/forgot-password', {
                    method: 'POST',
                    body: JSON.stringify({ email })
                });

                alertBox.className = 'alert alert-success';
                alertBox.innerHTML = `<i class="fa-solid fa-circle-check me-2"></i>${response.message}`;
                alertBox.classList.remove('d-none');
            } catch (error) {
                alertBox.className = 'alert alert-danger';
                alertBox.innerHTML = `<i class="fa-solid fa-circle-exclamation me-2"></i>${error.message}`;
                alertBox.classList.remove('d-none');
            } finally {
                submitBtn.innerHTML = originalBtnText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
