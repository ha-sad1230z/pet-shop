<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - PetShop</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fa-solid fa-paw"></i> PetShop
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Trang chủ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="products.html">Sản phẩm</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a href="cart.html" class="nav-link cart-icon">
                            <i class="fa-solid fa-cart-shopping fs-5"></i>
                            <span class="cart-badge" id="cart-count" style="display: none;">0</span>
                        </a>
                    </li>
                    <li class="nav-item dropdown ms-lg-3" id="userMenuContainer">
                        <!-- User menu will be injected here via JS -->
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Header (Breadcrumb) -->
    <div class="bg-white py-3 shadow-sm border-bottom mb-5">
        <div class="container">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none text-muted">Trang chủ</a></li>
                    <li class="breadcrumb-item"><a href="products.html" class="text-decoration-none text-muted">Sản phẩm</a></li>
                    <li class="breadcrumb-item active" aria-current="page" id="pd-name">Đang tải...</li>
                </ol>
            </nav>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container mb-5 pb-5">
        <div class="row bg-white rounded-4 shadow-sm p-4 p-md-5" id="product-detail-container">
            
            <!-- Product Image -->
            <div class="col-lg-6 mb-4 mb-lg-0 text-center">
                <div class="bg-light rounded-4 p-4 d-flex align-items-center justify-content-center" style="height: 100%; min-height: 400px;">
                    <img id="pd-image" src="" alt="Product" class="img-fluid" style="max-height: 400px; object-fit: contain;">
                </div>
            </div>

            <!-- Product Info -->
            <div class="col-lg-6 ps-lg-5 d-flex flex-column justify-content-center">
                <span id="pd-category" class="text-primary-custom fw-semibold mb-2 d-block text-uppercase" style="letter-spacing: 1px;"></span>
                <h1 id="pd-name" class="fw-bold mb-3 display-6">Đang tải sản phẩm...</h1>
                
                <div class="d-flex align-items-center mb-4">
                    <h2 id="pd-price" class="text-dark fw-bold mb-0 me-3">$0.00</h2>
                    <span id="pd-stock" class="badge bg-success px-3 py-2 rounded-pill fs-6"></span>
                </div>

                <p id="pd-desc" class="text-muted mb-5 lh-lg" style="font-size: 1.1rem;"></p>

                <hr class="mb-4 text-muted">

                <div class="d-flex align-items-center gap-3 mb-4">
                    <div style="width: 120px;">
                        <label for="pd-quantity" class="form-label text-muted small fw-semibold">Số lượng</label>
                        <div class="input-group">
                            <button class="btn btn-outline-secondary px-3" type="button" onclick="document.getElementById('pd-quantity').stepDown()">-</button>
                            <input type="number" id="pd-quantity" class="form-control text-center px-1" value="1" min="1">
                            <button class="btn btn-outline-secondary px-3" type="button" onclick="document.getElementById('pd-quantity').stepUp()">+</button>
                        </div>
                    </div>
                    <div class="flex-grow-1 align-self-end">
                        <button id="pd-add-to-cart" class="btn btn-primary w-100 py-3 d-flex align-items-center justify-content-center gap-2" style="font-size: 1.1rem;">
                            <i class="fa-solid fa-cart-shopping"></i> Thêm vào giỏ
                        </button>
                    </div>
                </div>
                
                <div class="d-flex align-items-center text-muted small gap-4 mt-3">
                    <span class="d-flex align-items-center gap-2"><i class="fa-solid fa-truck text-secondary-color fs-5"></i> Giao hàng miễn phí</span>
                    <span class="d-flex align-items-center gap-2"><i class="fa-solid fa-shield-cat text-secondary-color fs-5"></i> Đổi trả trong 30 ngày</span>
                </div>
            </div>

        </div>
    </div>

    <footer class="mt-auto">
        <div class="container">
            <hr class="my-4 text-muted">
            <div class="text-center text-muted pb-4">
                <small>&copy; 2026 PetShop. Bản quyền thuộc về PetShop.</small>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script src="js/product.js"></script>
    <script src="js/products.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderUserMenu();
            
            // Check if we are actually rendering a product, else show error
            const urlParams = new URLSearchParams(window.location.search);
            const productId = parseInt(urlParams.get('id'));
            
            if (!productId) {
                document.getElementById('product-detail-container').innerHTML = `
                    <div class="col-12 text-center py-5">
                        <i class="fa-solid fa-triangle-exclamation text-warning display-1 mb-3"></i>
                        <h3>Không tìm thấy sản phẩm</h3>
                        <p class="text-muted">Sản phẩm bạn đang tìm kiếm không tồn tại hoặc đã bị xóa.</p>
                        <a href="products.html" class="btn btn-primary mt-3">Xem các sản phẩm khác</a>
                    </div>
                `;
            } else {
                renderProductDetail();
            }
        });

        function renderUserMenu() {
            const user = getCurrentUser();
            const container = document.getElementById('userMenuContainer');
            if (user) {
                container.innerHTML = `
                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-2" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                        <img src="https://ui-avatars.com/api/?name=${user.fullName}&background=random" class="rounded-circle" width="32" height="32" alt="User">
                        <span>${user.fullName}</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="navbarDropdown">
                        ${(user.role === 'ADMIN' || user.role === 'STAFF') ? '<li><a class="dropdown-item" href="admin-dashboard.html"><i class="fa-solid fa-gauge me-2"></i> Bảng điều khiển</a></li>' : ''}
                        <li><a class="dropdown-item" href="profile.html"><i class="fa-regular fa-user me-2"></i> Hồ sơ</a></li>
                        <li><a class="dropdown-item" href="orders.html"><i class="fa-solid fa-box-open me-2"></i> Đơn hàng</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#" onclick="logout(); return false;"><i class="fa-solid fa-arrow-right-from-bracket me-2"></i> Đăng xuất</a></li>
                    </ul>
                `;
            } else {
                container.innerHTML = `
                    <a href="login.html" class="btn btn-outline-primary rounded-pill px-4">Đăng nhập</a>
                `;
            }
        }
    </script>
</body>
</html>
