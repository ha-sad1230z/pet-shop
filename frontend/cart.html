<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng của bạn - PetShop</title>
    <!-- Google Fonts/CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fa-solid fa-paw"></i> PetShop
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Sản phẩm</a></li>
                    <li class="nav-item ms-lg-3">
                        <a href="cart.html" class="nav-link active cart-icon">
                            <i class="fa-solid fa-cart-shopping fs-5"></i>
                            <span class="cart-badge" id="cart-count" style="display: none;">0</span>
                        </a>
                    </li>
                    <li class="nav-item dropdown ms-lg-3" id="userMenuContainer"></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="container py-5 mb-5">
        <h2 class="fw-bold mb-4">Giỏ hàng</h2>
        
        <div class="row g-4">
            <!-- Cart Items -->
            <div class="col-lg-8">
                <div class="bg-white rounded-4 shadow-sm p-4" id="cart-items-container">
                    <!-- Items injected by JS -->
                </div>
            </div>

            <!-- Summary -->
            <div class="col-lg-4" id="cart-summary" style="display: none;">
                <div class="card border-0 shadow-sm rounded-4 sticky-top" style="top: 100px;">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4">Tóm tắt đơn hàng</h5>
                        
                        <div class="d-flex justify-content-between mb-3 text-muted">
                            <span>Tổng phụ</span>
                            <span id="cart-subtotal" class="fw-semibold text-dark">$0.00</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3 text-muted">
                            <span>Thuế (8%)</span>
                            <span id="cart-tax" class="fw-semibold text-dark">$0.00</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3 text-muted">
                            <span>Giao hàng</span>
                            <span class="text-success fw-semibold">Miễn phí</span>
                        </div>
                        
                        <hr class="my-4 text-muted">
                        
                        <div class="d-flex justify-content-between mb-4">
                            <span class="fw-bold fs-5">Tổng cộng</span>
                            <span id="cart-total" class="fw-bold fs-4 text-primary-custom">$0.00</span>
                        </div>
                        
                        <button onclick="checkout()" class="btn btn-primary w-100 py-3 fw-bold shadow-sm">
                            Tiến hành thanh toán <i class="fa-solid fa-arrow-right ms-2"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-auto">
        <div class="container">
            <hr class="my-4 text-muted">
            <div class="text-center text-muted pb-4">
                <small>&copy; 2026 PetShop. Bản quyền thuộc về PetShop.</small>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script src="js/order.js"></script>
    <script src="js/product.js"></script>
    <script src="js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Render from main.js (dummy)
            const user = getCurrentUser();
            const container = document.getElementById('userMenuContainer');
            if (user) {
                container.innerHTML = `
                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-2" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                        <img src="https://ui-avatars.com/api/?name=${user.fullName}&background=random" class="rounded-circle" width="32" height="32" alt="User">
                        <span>${user.fullName}</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="navbarDropdown">
                        ${(user.role === 'ADMIN' || user.role === 'STAFF') ? '<li><a class="dropdown-item" href="admin-dashboard.html"><i class="fa-solid fa-gauge me-2"></i> Bảng điều khiển</a></li>' : ''}
                        <li><a class="dropdown-item" href="profile.html"><i class="fa-regular fa-user me-2"></i> Hồ sơ</a></li>
                        <li><a class="dropdown-item" href="orders.html"><i class="fa-solid fa-box-open me-2"></i> Đơn hàng</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#" onclick="logout(); return false;"><i class="fa-solid fa-arrow-right-from-bracket me-2"></i> Đăng xuất</a></li>
                    </ul>
                `;
            } else {
                container.innerHTML = `<a href="login.html" class="btn btn-outline-primary rounded-pill px-4">Đăng nhập</a>`;
            }

            renderCartItems();
        });
    </script>
</body>
</html>
