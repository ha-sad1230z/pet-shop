<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - PetShop</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-split">
        <!-- Image Section -->
        <div class="auth-img" style="background-image: url('https://images.unsplash.com/photo-1583337130417-3346a1be7dee?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');">
        </div>

        <!-- Form Section -->
        <div class="auth-form-wrapper">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <a href="index.html" class="text-decoration-none">
                        <h2 class="navbar-brand justify-content-center mb-3">
                            <i class="fa-solid fa-paw text-primary-custom"></i> PetShop
                        </h2>
                    </a>
                    <h4>Tạo tài khoản</h4>
                    <p class="text-muted">Tham gia cùng chúng tôi để tìm những điều tốt nhất cho thú cưng của bạn!</p>
                </div>

                <div id="registerAlert" class="alert d-none" role="alert"></div>

                <form id="registerForm">
                    <div class="mb-3">
                        <label for="regFullName" class="form-label fw-semibold">Họ và tên</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-regular fa-address-card"></i></span>
                            <input type="text" class="form-control" id="regFullName" required placeholder="Nguyễn Văn A">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="regEmail" class="form-label fw-semibold">Địa chỉ Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
                            <input type="email" class="form-control" id="regEmail" required placeholder="nguyenvana@example.com">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="regUsername" class="form-label fw-semibold">Tên đăng nhập</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-regular fa-user"></i></span>
                            <input type="text" class="form-control" id="regUsername" required placeholder="nguyenvana123">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="regPassword" class="form-label fw-semibold">Mật khẩu</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" class="form-control" id="regPassword" required placeholder="Tạo mật khẩu">
                            <button class="btn btn-outline-secondary" type="button" id="toggleRegPassword">
                                <i class="fa-regular fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="regConfirmPassword" class="form-label fw-semibold">Xác nhận mật khẩu</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" class="form-control" id="regConfirmPassword" required placeholder="Xác nhận lại mật khẩu">
                        </div>
                        <div id="passwordMatchError" class="text-danger small mt-1 d-none">Mật khẩu không khớp.</div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Đăng ký</button>
                    <p class="text-center text-muted mb-0">Đã có tài khoản? <a href="login.html" class="text-decoration-none text-primary-custom fw-semibold">Đăng nhập tại đây</a></p>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('toggleRegPassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('regPassword');
            const icon = this.querySelector('i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const fullName = document.getElementById('regFullName').value;
            const email = document.getElementById('regEmail').value;
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const matchError = document.getElementById('passwordMatchError');
            const alertBox = document.getElementById('registerAlert');
            const submitBtn = this.querySelector('button[type="submit"]');

            if (password !== confirmPassword) {
                matchError.classList.remove('d-none');
                return;
            } else {
                matchError.classList.add('d-none');
            }

            alertBox.classList.add('d-none');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Đang đăng ký...';

            try {
                const userData = {
                    username: username,
                    password: password,
                    email: email,
                    fullName: fullName,
                    role: 'CUSTOMER'
                };
                await registerAPI(userData);
                
                alertBox.className = 'alert alert-success';
                alertBox.textContent = 'Đăng ký thành công! Đang chuyển hướng đến trang đăng nhập...';
                alertBox.classList.remove('d-none');
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } catch (error) {
                alertBox.className = 'alert alert-danger';
                alertBox.textContent = error.message || 'Đăng ký thất bại. Vui lòng thử lại!';
                alertBox.classList.remove('d-none');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Đăng ký';
            }
        });
    </script>
</body>
</html>
